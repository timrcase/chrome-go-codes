<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Go Codes</title>
  <link rel="stylesheet" href="manage.css">
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <img src="icons/icon128.png" alt="" class="brand-icon" width="40" height="40">
        <h1>Go Codes</h1>
      </div>
      <p class="hint">Type <code>go &lt;code&gt;</code> in the address bar to jump to a URL.</p>
    </header>

    <p id="notice" class="notice" role="alert" hidden></p>

    <section class="add-row">
      <form id="add-form">
        <input id="code-input" type="text" placeholder="shortcode (e.g. gh)" autocomplete="off" required>
        <input id="url-input" type="text" placeholder="https://github.com" autocomplete="off" required>
        <button type="submit">Add</button>
      </form>
      <p id="error" class="error" hidden></p>
    </section>

    <section class="counter-row" aria-live="polite">
      <div class="counter">
        <span id="counter-text">0 / 500 codes</span>
        <div class="counter-bar"><div id="counter-fill" class="counter-fill"></div></div>
      </div>
    </section>

    <section>
      <table id="codes-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>URL</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="codes-body"></tbody>
      </table>
      <p id="empty" class="empty" hidden>No codes yet. Add one above.</p>
    </section>
  </main>

  <script src="manage.js"></script>
</body>
</html>
