name: Build Chrome Extension

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build vendored Material Web bundle
        run: npm run build

      - name: Create zip
        run: cd src && zip -r -9 ../${{ github.event.repository.name }}.zip .

      - name: Create release and attach zip
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}.zip
